name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Install extension dependencies
        run: npm --prefix vscode-extension ci

      - name: Ruff
        run: >
          poetry run ruff check
          src/app_service.py
          src/main.py
          src/tools/chat_engine.py
          src/tools/dashboard.py
          src/tools/status_report.py
          src/tools/commanding
          tests/test_app_service.py
          tests/test_chat_engine.py
          tests/test_dashboard.py
          tests/test_repo_summary_chat.py
          tests/test_status_benchmark.py

      - name: Mypy
        run: poetry run mypy

      - name: Pytest
        run: poetry run pytest -q

      - name: Extension Compile
        run: npm --prefix vscode-extension run compile:clean

      - name: Extension Smoke
        run: npm --prefix vscode-extension run test:smoke

      - name: Extension VSIX Verify
        run: npm --prefix vscode-extension run verify:vsix
